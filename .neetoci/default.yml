version: v1.0

plan: standard-2

paths:
  - app/**
  - bin/**
  - config/**
  - db/**
  - lib/**
  - test/**
  - .neetoci/default.yml
  - .neetoci/scripts/run_eslint_on_modified_files.sh
  - .neetoci/scripts/run_rubocop_and_erblint_on_modified_files.sh
  - .neetoci/scripts/check_schema_drift.sh
  - Gemfile*
  - package.json
  - yarn.lock
  - Rakefile
  - .env.test
  - config.ru
  - .*.yml
  - .ruby-version
  - .node-version
  - .nvmrc
  - .active_record_doctor.rb
  - .prettierrc.js
  - "*.config.*"
  - .eslintignore
  - .eslintrc.js

global_job_config:
  setup:
    - checkout
    - neetoci-version node 22.13
    - cache restore
    - yarn install --frozen-lockfile
    - cache store
  jobs:
    - name: CiChecks
      commands:
        - .scripts/run_eslint_on_modified_files.sh
        - yarn test

triggers:
  - event: branch
    branch_name: main
  - event: pull_request
